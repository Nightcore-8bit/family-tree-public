<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded background -->
  <defs>
    <linearGradient id="appleBg" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appleTree" x1="0" y1="30" x2="0" y2="150">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="180" height="180" rx="40" fill="url(#appleBg)"/>
  
  <!-- Central trunk -->
  <line x1="90" y1="120" x2="90" y2="155" stroke="url(#appleTree)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Root connection lines -->
  <line x1="90" y1="120" x2="55" y2="150" stroke="url(#appleTree)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="90" y1="120" x2="125" y2="150" stroke="url(#appleTree)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Primary branches -->
  <line x1="90" y1="85" x2="50" y2="55" stroke="url(#appleTree)" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="85" x2="130" y2="55" stroke="url(#appleTree)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Secondary branches -->
  <line x1="50" y1="55" x2="30" y2="30" stroke="url(#appleTree)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="50" y1="55" x2="70" y2="30" stroke="url(#appleTree)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="130" y1="55" x2="110" y2="30" stroke="url(#appleTree)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="130" y1="55" x2="150" y2="30" stroke="url(#appleTree)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Nodes -->
  <circle cx="90" cy="105" r="6" fill="#22d3ee" opacity="0.9"/>
  
  <circle cx="50" cy="55" r="5" fill="#3b82f6" opacity="0.85"/>
  <circle cx="130" cy="55" r="5" fill="#3b82f6" opacity="0.85"/>
  
  <circle cx="30" cy="30" r="4" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="70" cy="30" r="4" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="110" cy="30" r="4" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="150" cy="30" r="4" fill="#0ea5e9" opacity="0.8"/>
</svg>