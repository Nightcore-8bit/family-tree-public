<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="512" height="512" fill="url(#bgGradientLarge)"/>
  
  <!-- Subtle background pattern -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ringGradient)" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ringGradient)" stroke-width="1" opacity="0.15"/>
  
  <!-- Define gradients -->
  <defs>
    <linearGradient id="bgGradientLarge" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="treeGradientLarge" x1="0" y1="100" x2="0" y2="420">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Central trunk -->
  <line x1="256" y1="380" x2="256" y2="420" stroke="url(#treeGradientLarge)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Root connection lines -->
  <line x1="256" y1="380" x2="180" y2="420" stroke="url(#treeGradientLarge)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="380" x2="332" y2="420" stroke="url(#treeGradientLarge)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Primary branches (Generation 2) -->
  <line x1="256" y1="300" x2="140" y2="240" stroke="url(#treeGradientLarge)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="300" x2="372" y2="240" stroke="url(#treeGradientLarge)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Secondary branches (Generation 3) -->
  <!-- Left side -->
  <line x1="140" y1="240" x2="90" y2="160" stroke="url(#treeGradientLarge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="240" x2="190" y2="160" stroke="url(#treeGradientLarge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Right side -->
  <line x1="372" y1="240" x2="322" y2="160" stroke="url(#treeGradientLarge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="372" y1="240" x2="422" y2="160" stroke="url(#treeGradientLarge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Tertiary branches (Generation 4) -->
  <!-- Far left -->
  <line x1="90" y1="160" x2="60" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="90" y1="160" x2="120" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Left-center -->
  <line x1="190" y1="160" x2="160" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="190" y1="160" x2="220" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Right-center -->
  <line x1="322" y1="160" x2="292" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="322" y1="160" x2="352" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Far right -->
  <line x1="422" y1="160" x2="392" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="422" y1="160" x2="452" y2="90" stroke="url(#treeGradientLarge)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Generation nodes (circles with glow effect) -->
  <!-- Root node (Generation 1) -->
  <circle cx="256" cy="360" r="14" fill="url(#accentGradient)" opacity="0.9"/>
  <circle cx="256" cy="360" r="14" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
  
  <!-- Generation 2 nodes -->
  <circle cx="140" cy="240" r="12" fill="#3b82f6" opacity="0.85"/>
  <circle cx="140" cy="240" r="12" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  
  <circle cx="372" cy="240" r="12" fill="#3b82f6" opacity="0.85"/>
  <circle cx="372" cy="240" r="12" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Generation 3 nodes -->
  <circle cx="90" cy="160" r="10" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="90" cy="160" r="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  
  <circle cx="190" cy="160" r="10" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="190" cy="160" r="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  
  <circle cx="322" cy="160" r="10" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="322" cy="160" r="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  
  <circle cx="422" cy="160" r="10" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="422" cy="160" r="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  
  <!-- Generation 4 nodes -->
  <circle cx="60" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="120" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="160" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="220" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="292" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="352" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="392" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
  <circle cx="452" cy="90" r="8" fill="#06b6d4" opacity="0.75"/>
</svg>